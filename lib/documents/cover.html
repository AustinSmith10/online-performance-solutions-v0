<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400&display=swap');

  @page {
    size: A4 portrait;
    margin: 0;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 210mm;
    font-family: 'Barlow', sans-serif;
  }

  .page {
    position: relative;
    width: 210mm;
    height: 297mm;
    overflow: hidden;
  }

  /* 1 — Full-bleed background photo */
  .bg-photo {
    position: absolute;
    top: 0;
    left: 0;
    width: 210mm;
    height: 297mm;
    object-fit: fill;
  }

  /*
   * 2 — White polygon overlay
   *
   * Spans full page width. Custom trapezoid shape:
   *   top-left (0, 0) → top-right (100%, 0)
   *   → right edge drops to 10.61% height (31.5mm)
   *   → diagonal to 95.19% width at 17.55% height (52.1mm)
   *   → bottom-left (0, 52.1mm)
   *
   * alpha=95000 in Word = 95% opaque → rgba(255,255,255,0.95)
   */
  .white-panel {
    position: absolute;
    top: 0;
    left: -1.6mm;
    width: 211.6mm;
    height: 52.1mm;
    background: rgba(255, 255, 255, 0.95);
    clip-path: polygon(
      0 0,
      100% 0,
      100% 60.55%,
      94.96% 100%,
      0 100%
    );
  }

  /*
   * 3 — Cover header: two-column layout
   *   Col 1 (116.2mm): building icon, right-aligned
   *   Col 2 (61.2mm): brand name + doc type
   *   Top margin: 9mm, left margin: 20mm
   *   Row height: 17.5mm
   */
  .cover-header {
    position: absolute;
    top: 9mm;
    left: 20mm;
    width: 177.4mm;
    height: 17.5mm;
    display: flex;
    align-items: flex-start;
  }

  .header-icon-col {
    width: 116.2mm;
    height: 17.5mm;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding-right: 3.5mm;
    flex-shrink: 0;
  }

  .header-icon-col img {
    width: 5.6mm;
    height: 7.9mm;
  }

  .header-brand-col {
    width: 61.2mm;
    flex-shrink: 0;
    padding-top: 0.5mm;
  }

  .brand-division {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 8.5pt;
    letter-spacing: 2.25pt;
    text-transform: uppercase;
    color: #000;
    line-height: 1.55;
  }

  .brand-doctype {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 8.5pt;
    letter-spacing: 2.25pt;
    text-transform: uppercase;
    color: #000;
    line-height: 1.55;
    margin-top: 1.5mm;
  }

  /*
   * 4 — Info table
   *   Left edge: 138mm from page left (20mm margin + 118mm indent)
   *   Width: 61.1mm (label 14.5mm + value 46.6mm)
   *   Top: ~30mm (below header row + spacer paragraph)
   */
  /* Straight Connector 6 — vertical divider at x=121.39mm, full panel height */
  .divider-v {
    position: absolute;
    left: 121.39mm;
    top: 0;
    width: 0.25mm;
    height: 52.12mm;
    background: #707070;
  }

  /* Straight Connector 7 — horizontal divider at y=30.49mm, right portion of panel */
  .divider-h {
    position: absolute;
    left: 121.39mm;
    top: 30.49mm;
    width: 88.61mm;
    height: 0.25mm;
    background: #707070;
  }

  .info-table {
    position: absolute;
    top: 33mm;
    left: 138mm;
    width: 61.1mm;
    border-collapse: collapse;
  }

  .info-table td {
    vertical-align: top;
    padding: 0.4mm 0;
  }

  .info-label {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: 7pt;
    color: #000;
    width: 14.5mm;
    white-space: nowrap;
    padding-right: 2mm;
  }

  .info-value {
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: 7pt;
    color: #000;
    width: 46.6mm;
    line-height: 1.3;
  }
</style>
</head>
