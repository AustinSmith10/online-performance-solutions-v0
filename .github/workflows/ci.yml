name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  concurrency:
    name: Ledger concurrency (real Postgres)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start Supabase local dev stack
        run: npx supabase start

      - name: Export Supabase local env
        run: npx supabase status -o env | grep -E '^[A-Z_]+=' | sed 's/"//g' >> "$GITHUB_ENV"

      - name: Run ledger concurrency tests
        env:
          SUPABASE_TEST_URL: ${{ env.API_URL }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
        run: npm run test:concurrency

      - name: Stop Supabase
        if: always()
        run: npx supabase stop
